<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Socios del club</h1>
        <form action="">
            <input type="text" id="name" placeholder="Nombre" required>
            <input type="text" id="text" placeholder="N° de socio" required>
            <input type="email" id="email" placeholder="Correo Electrónico" required>
            <input type="text" id="phone" placeholder="Teléfono" required>
            <button type="submit">Agregar socio</button>
        </form>

        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>N° de socio</th>
                    <th>Correo</th>
                    <th>Teléfono</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="contacts-table"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
